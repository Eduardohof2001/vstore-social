<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StellaBlu - Instagram</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fafafa;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .card{background:#fff;border:1px solid #dbdbdb;border-radius:8px;padding:40px;text-align:center;max-width:420px;width:90%}
    .logo{font-size:48px;margin-bottom:16px}
    .name{font-size:22px;font-weight:700;color:#262626;margin-bottom:6px}
    .handle{font-size:15px;color:#8e8e8e;margin-bottom:24px}
    .btn{display:inline-block;background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);color:#fff;padding:12px 32px;border-radius:4px;text-decoration:none;font-weight:600;font-size:14px}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📸</div>
    <div class="name">StellaBlu</div>
    <div class="handle">@stellabluoficial</div>
    <a href="https://www.instagram.com/stellabluoficial/" target="_blank" class="btn">Ver no Instagram</a>
  </div>
</body>
</html>
